<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Changer & Downloader</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        video { width: 100%; margin-top: 10px; background: #000; border-radius: 5px; }
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .row { display: flex; align-items: center; justify-content: space-between; }
        button { cursor: pointer; padding: 10px; border: none; border-radius: 5px; background: #007bff; color: white; transition: 0.3s; }
        button:disabled { background: #ccc; }
        button:hover:not(:disabled) { background: #0056b3; }
        #downloadBtn { background: #28a745; }
    </style>
</head>
<body>

<div class="container">
    <h2>ピッチ調整 & ダウンロード</h2>
    
    <input type="file" id="fileInput" accept="video/*,audio/*">
    
    <video id="mediaPlayer" controls></video>

    <div class="controls">
        <div class="row">
            <label for="pitchRange">ピッチ (速度): <span id="pitchValue">1.0</span>x</label>
            <input type="range" id="pitchRange" min="0.5" max="2.0" step="0.05" value="1.0">
        </div>

        <div class="row">
            <button id="recordBtn" disabled>録音開始 (再生しながら録音)</button>
            <button id="stopBtn" disabled>停止</button>
        </div>

        <button id="downloadBtn" style="display: none;">加工済みファイルをダウンロード</button>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const mediaPlayer = document.getElementById('mediaPlayer');
    const pitchRange = document.getElementById('pitchRange');
    const pitchValue = document.getElementById('pitchValue');
    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    let audioCtx, source, streamDest, mediaRecorder, chunks = [];

    // ファイル読み込み
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            mediaPlayer.src = url;
            recordBtn.disabled = false;
            downloadBtn.style.display = 'none';
        }
    });

    // ピッチ調整 (再生速度を変更)
    pitchRange.addEventListener('input', (e) => {
        const val = e.target.value;
        pitchValue.textContent = val;
        mediaPlayer.playbackRate = val;
        // ブラウザの「ピッチ維持機能」をオフにする（音程を変化させるため）
        mediaPlayer.preservesPitch = false; 
    });

    // 録音ロジック
    recordBtn.addEventListener('click', () => {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            source = audioCtx.createMediaElementSource(mediaPlayer);
            streamDest = audioCtx.createMediaStreamDestination();
            
            // 音をスピーカーと録音用の両方に流す
            source.connect(streamDest);
            source.connect(audioCtx.destination);
        }

        chunks = [];
        mediaRecorder = new MediaRecorder(streamDest.stream);
        
        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/webm' }); // WebM形式で保存
            const url = URL.createObjectURL(blob);
            downloadBtn.href = url;
            downloadBtn.download = `processed_pitch_${pitchRange.value}.webm`;
            downloadBtn.style.display = 'block';
            downloadBtn.onclick = () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = `output.webm`;
                a.click();
            };
        };

        mediaRecorder.start();
        mediaPlayer.play();
        
        recordBtn.disabled = true;
        stopBtn.disabled = false;
    });

    stopBtn.addEventListener('click', () => {
        mediaRecorder.stop();
        mediaPlayer.pause();
        recordBtn.disabled = false;
        stopBtn.disabled = true;
    });
</script>

</body>
</html>
